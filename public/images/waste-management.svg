<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <!-- Background -->
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <!-- Recycle Symbol -->
  <g transform="translate(400, 300) scale(3)">
    <!-- Arrow 1 -->
    <path d="M0,-40 L10,-25 L5,-25 L5,-5 L20,-5 L20,-10 L35,0 L20,10 L20,5 L-5,5 L-5,25 L0,25 L-10,40 L-20,25 L-15,25 L-15,0 L0,0 Z" fill="#28a745"/>
    <!-- Arrow 2 -->
    <path d="M0,40 L-10,25 L-5,25 L-5,5 L-20,5 L-20,10 L-35,0 L-20,-10 L-20,-5 L5,-5 L5,-25 L0,-25 L10,-40 L20,-25 L15,-25 L15,0 L0,0 Z" fill="#1e7e34"/>
    <!-- Arrow 3 -->
    <path d="M-35,0 L-20,-10 L-20,-5 L5,-5 L5,-25 L0,-25 L10,-40 L20,-25 L15,-25 L15,5 L-5,5 L-5,25 L-15,25 L-15,0 Z" fill="#86c232"/>
  </g>
  
  <!-- Waste Bins -->
  <g transform="translate(200, 450)">
    <!-- Green Bin -->
    <rect x="-50" y="-80" width="40" height="60" rx="5" fill="#28a745"/>
    <rect x="-55" y="-85" width="50" height="10" rx="3" fill="#1e7e34"/>
    <text x="-30" y="-45" font-family="Arial" font-size="12" fill="white" text-anchor="middle">PAPER</text>
    
    <!-- Blue Bin -->
    <rect x="0" y="-80" width="40" height="60" rx="5" fill="#0275d8"/>
    <rect x="-5" y="-85" width="50" height="10" rx="3" fill="#0056b3"/>
    <text x="20" y="-45" font-family="Arial" font-size="12" fill="white" text-anchor="middle">PLASTIC</text>
    
    <!-- Yellow Bin -->
    <rect x="50" y="-80" width="40" height="60" rx="5" fill="#ffc107"/>
    <rect x="45" y="-85" width="50" height="10" rx="3" fill="#d39e00"/>
    <text x="70" y="-45" font-family="Arial" font-size="12" fill="white" text-anchor="middle">METAL</text>
  </g>
  
  <!-- Tree -->
  <g transform="translate(600, 350)">
    <rect x="-10" y="0" width="20" height="80" fill="#6d4c41"/>
    <circle cx="0" cy="-30" r="50" fill="#28a745"/>
  </g>
  
  <!-- Sun -->
  <circle cx="700" cy="100" r="40" fill="#ffc107"/>
  <g transform="translate(700, 100)">
    <line x1="0" y1="-60" x2="0" y2="-45" stroke="#ffc107" stroke-width="5"/>
    <line x1="0" y1="45" x2="0" y2="60" stroke="#ffc107" stroke-width="5"/>
    <line x1="-60" y1="0" x2="-45" y2="0" stroke="#ffc107" stroke-width="5"/>
    <line x1="45" y1="0" x2="60" y2="0" stroke="#ffc107" stroke-width="5"/>
    <line x1="-42" y1="-42" x2="-32" y2="-32" stroke="#ffc107" stroke-width="5"/>
    <line x1="-42" y1="42" x2="-32" y2="32" stroke="#ffc107" stroke-width="5"/>
    <line x1="42" y1="-42" x2="32" y2="-32" stroke="#ffc107" stroke-width="5"/>
    <line x1="42" y1="42" x2="32" y2="32" stroke="#ffc107" stroke-width="5"/>
  </g>
</svg> 