<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <!-- Background -->
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <!-- Dashboard Frame -->
  <rect x="50" y="50" width="700" height="500" rx="10" fill="white" stroke="#dee2e6" stroke-width="2"/>
  
  <!-- Header -->
  <rect x="50" y="50" width="700" height="60" rx="10" fill="#1e7e34" stroke="#1e7e34" stroke-width="2"/>
  <text x="400" y="85" font-family="Arial" font-size="20" font-weight="bold" fill="white" text-anchor="middle">WETE WASTE MANAGEMENT DASHBOARD</text>
  
  <!-- Chart 1: Bar Chart -->
  <g transform="translate(200, 200)">
    <rect x="-100" y="-80" width="200" height="160" rx="5" fill="white" stroke="#dee2e6" stroke-width="1"/>
    <text x="0" y="-60" font-family="Arial" font-size="14" font-weight="bold" fill="#333" text-anchor="middle">Waste Collection by Type</text>
    
    <!-- Chart Title -->
    <line x1="-80" y1="-40" x2="80" y2="-40" stroke="#eee" stroke-width="1"/>
    <line x1="-80" y1="-20" x2="80" y2="-20" stroke="#eee" stroke-width="1"/>
    <line x1="-80" y1="0" x2="80" y2="0" stroke="#eee" stroke-width="1"/>
    <line x1="-80" y1="20" x2="80" y2="20" stroke="#eee" stroke-width="1"/>
    <line x1="-80" y1="40" x2="80" y2="40" stroke="#eee" stroke-width="1"/>
    
    <!-- Y Axis -->
    <line x1="-80" y1="-40" x2="-80" y2="40" stroke="#333" stroke-width="1"/>
    
    <!-- X Axis -->
    <line x1="-80" y1="40" x2="80" y2="40" stroke="#333" stroke-width="1"/>
    
    <!-- Bars -->
    <rect x="-70" y="0" width="20" height="40" fill="#28a745"/>
    <rect x="-40" y="-20" width="20" height="60" fill="#17a2b8"/>
    <rect x="-10" y="-30" width="20" height="70" fill="#ffc107"/>
    <rect x="20" y="-10" width="20" height="50" fill="#dc3545"/>
    <rect x="50" y="-5" width="20" height="45" fill="#6f42c1"/>
  </g>
  
  <!-- Chart 2: Pie Chart -->
  <g transform="translate(600, 200)">
    <rect x="-100" y="-80" width="200" height="160" rx="5" fill="white" stroke="#dee2e6" stroke-width="1"/>
    <text x="0" y="-60" font-family="Arial" font-size="14" font-weight="bold" fill="#333" text-anchor="middle">Recycling Rates</text>
    
    <!-- Pie Segments -->
    <path d="M0,0 L50,0 A50,50 0 0,1 25,43.3 z" fill="#28a745"/>
    <path d="M0,0 L25,43.3 A50,50 0 0,1 -25,43.3 z" fill="#17a2b8"/>
    <path d="M0,0 L-25,43.3 A50,50 0 0,1 -50,0 z" fill="#ffc107"/>
    <path d="M0,0 L-50,0 A50,50 0 0,1 -25,-43.3 z" fill="#dc3545"/>
    <path d="M0,0 L-25,-43.3 A50,50 0 0,1 25,-43.3 z" fill="#6f42c1"/>
    <path d="M0,0 L25,-43.3 A50,50 0 0,1 50,0 z" fill="#fd7e14"/>
  </g>
  
  <!-- Chart 3: Line Chart -->
  <g transform="translate(200, 400)">
    <rect x="-100" y="-80" width="200" height="160" rx="5" fill="white" stroke="#dee2e6" stroke-width="1"/>
    <text x="0" y="-60" font-family="Arial" font-size="14" font-weight="bold" fill="#333" text-anchor="middle">Monthly Waste Trends</text>
    
    <!-- Chart Grid -->
    <line x1="-80" y1="-40" x2="80" y2="-40" stroke="#eee" stroke-width="1"/>
    <line x1="-80" y1="-20" x2="80" y2="-20" stroke="#eee" stroke-width="1"/>
    <line x1="-80" y1="0" x2="80" y2="0" stroke="#eee" stroke-width="1"/>
    <line x1="-80" y1="20" x2="80" y2="20" stroke="#eee" stroke-width="1"/>
    <line x1="-80" y1="40" x2="80" y2="40" stroke="#eee" stroke-width="1"/>
    
    <!-- Y Axis -->
    <line x1="-80" y1="-40" x2="-80" y2="40" stroke="#333" stroke-width="1"/>
    
    <!-- X Axis -->
    <line x1="-80" y1="40" x2="80" y2="40" stroke="#333" stroke-width="1"/>
    
    <!-- Line -->
    <polyline points="-80,20 -60,10 -40,30 -20,0 0,-20 20,-10 40,-30 60,-20 80,0" fill="none" stroke="#28a745" stroke-width="2"/>
    
    <!-- Data Points -->
    <circle cx="-80" cy="20" r="3" fill="#28a745"/>
    <circle cx="-60" cy="10" r="3" fill="#28a745"/>
    <circle cx="-40" cy="30" r="3" fill="#28a745"/>
    <circle cx="-20" cy="0" r="3" fill="#28a745"/>
    <circle cx="0" cy="-20" r="3" fill="#28a745"/>
    <circle cx="20" cy="-10" r="3" fill="#28a745"/>
    <circle cx="40" cy="-30" r="3" fill="#28a745"/>
    <circle cx="60" cy="-20" r="3" fill="#28a745"/>
    <circle cx="80" cy="0" r="3" fill="#28a745"/>
  </g>
  
  <!-- Chart 4: KPI Cards -->
  <g transform="translate(600, 400)">
    <rect x="-100" y="-80" width="200" height="160" rx="5" fill="white" stroke="#dee2e6" stroke-width="1"/>
    <text x="0" y="-60" font-family="Arial" font-size="14" font-weight="bold" fill="#333" text-anchor="middle">Key Performance Indicators</text>
    
    <!-- KPI 1 -->
    <rect x="-80" y="-40" width="70" height="50" rx="3" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1"/>
    <text x="-45" y="-25" font-family="Arial" font-size="10" fill="#333" text-anchor="middle">Waste Reduction</text>
    <text x="-45" y="-5" font-family="Arial" font-size="16" font-weight="bold" fill="#28a745" text-anchor="middle">24%</text>
    
    <!-- KPI 2 -->
    <rect x="10" y="-40" width="70" height="50" rx="3" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1"/>
    <text x="45" y="-25" font-family="Arial" font-size="10" fill="#333" text-anchor="middle">Recycling Rate</text>
    <text x="45" y="-5" font-family="Arial" font-size="16" font-weight="bold" fill="#17a2b8" text-anchor="middle">38%</text>
    
    <!-- KPI 3 -->
    <rect x="-80" y="20" width="70" height="50" rx="3" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1"/>
    <text x="-45" y="35" font-family="Arial" font-size="10" fill="#333" text-anchor="middle">Collection Points</text>
    <text x="-45" y="55" font-family="Arial" font-size="16" font-weight="bold" fill="#ffc107" text-anchor="middle">45</text>
    
    <!-- KPI 4 -->
    <rect x="10" y="20" width="70" height="50" rx="3" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1"/>
    <text x="45" y="35" font-family="Arial" font-size="10" fill="#333" text-anchor="middle">Waste Processed</text>
    <text x="45" y="55" font-family="Arial" font-size="16" font-weight="bold" fill="#dc3545" text-anchor="middle">2.5t</text>
  </g>
</svg> 